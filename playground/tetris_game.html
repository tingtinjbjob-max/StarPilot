<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄羅斯方塊</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .game-container {
            display: flex;
            gap: 30px;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .game-board {
            position: relative;
        }

        canvas {
            border: 5px solid #fff;
            background: #000;
            display: block;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .info-panel {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            color: white;
            min-width: 200px;
        }

        .info-section {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .info-section h3 {
            font-size: 18px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .score-value, .level-value, .lines-value {
            font-size: 32px;
            font-weight: bold;
            color: #4ecca3;
            margin-bottom: 10px;
        }

        .next-piece {
            background: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 8px;
            min-height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .next-piece canvas {
            border: 2px solid rgba(255, 255, 255, 0.5);
            background: #000;
            margin: 0;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            border: 2px solid rgba(255, 255, 255, 0.3);
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            padding: 12px 20px;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #4ecca3 0%, #44a08d 100%);
            color: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(78, 204, 163, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .controls-desc {
            color: rgba(255, 255, 255, 0.8);
            font-size: 13px;
            margin-top: 15px;
            line-height: 1.6;
        }

        .controls-desc p {
            margin-bottom: 8px;
        }

        .key {
            background: rgba(78, 204, 163, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .title {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        @media (max-width: 1024px) {
            .game-container {
                flex-direction: column;
                gap: 20px;
            }

            .info-panel {
                flex-direction: row;
                justify-content: space-around;
            }

            .info-section {
                flex: 1;
                min-width: 0;
            }
        }
    </style>
</head>
<body>
    <div style="width: 100%; padding: 20px;">
        <div class="title">🎮 俄羅斯方塊</div>
        <div class="game-container">
            <div class="game-board">
                <canvas id="gameCanvas" width="200" height="400"></canvas>
            </div>
            <div class="info-panel">
                <div class="info-section">
                    <h3>得分</h3>
                    <div class="score-value" id="score">0</div>
                </div>
                <div class="info-section">
                    <h3>等級</h3>
                    <div class="level-value" id="level">1</div>
                </div>
                <div class="info-section">
                    <h3>消除行數</h3>
                    <div class="lines-value" id="lines">0</div>
                </div>
                <div class="info-section">
                    <h3>下一個方塊</h3>
                    <div class="next-piece">
                        <canvas id="nextCanvas" width="60" height="60"></canvas>
                    </div>
                </div>
                <div class="controls">
                    <div class="button-group">
                        <button id="startBtn">開始遊戲</button>
                        <button id="pauseBtn" disabled>暫停</button>
                        <button id="resetBtn">重新開始</button>
                    </div>
                    <div class="controls-desc">
                        <p><span class="key">←</span> <span class="key">→</span> 移動</p>
                        <p><span class="key">↓</span> 加速下降</p>
                        <p><span class="key">↑</span> 或 <span class="key">Z</span> 旋轉</p>
                        <p><span class="key">Space</span> 快速落下</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 遊戲配置
        const ROWS = 20;
        const COLS = 10;
        const BLOCK_SIZE = 20;

        // 俄羅斯方塊形狀
        const SHAPES = [
            // I
            [[1, 1, 1, 1]],
            // O
            [[1, 1], [1, 1]],
            // T
            [[0, 1, 0], [1, 1, 1]],
            // L
            [[1, 0], [1, 0], [1, 1]],
            // J
            [[0, 1], [0, 1], [1, 1]],
            // S
            [[0, 1, 1], [1, 1, 0]],
            // Z
            [[1, 1, 0], [0, 1, 1]]
        ];

        const COLORS = [
            '#00d4ff', // I - 青色
            '#ffff00', // O - 黃色
            '#ff00ff', // T - 紫色
            '#ff8800', // L - 橙色
            '#0088ff', // J - 藍色
            '#00ff00', // S - 綠色
            '#ff0000'  // Z - 紅色
        ];

        class TetrisGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.nextCanvas = document.getElementById('nextCanvas');
                this.nextCtx = this.nextCanvas.getContext('2d');

                this.grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
                this.currentPiece = null;
                this.nextPiece = null;
                this.score = 0;
                this.lines = 0;
                this.level = 1;
                this.gameActive = false;
                this.gamePaused = false;
                this.dropCounter = 0;
                this.dropInterval = this.getDropInterval();

                this.setupEventListeners();
                this.generateNextPiece();
            }

            setupEventListeners() {
                document.addEventListener('keydown', (e) => this.handleKeyPress(e));
                document.getElementById('startBtn').addEventListener('click', () => this.start());
                document.getElementById('pauseBtn').addEventListener('click', () => this.togglePause());
                document.getElementById('resetBtn').addEventListener('click', () => this.reset());
            }

            handleKeyPress(e) {
                if (!this.gameActive || this.gamePaused) return;

                switch (e.key) {
                    case 'ArrowLeft':
                        this.moveLeft();
                        e.preventDefault();
                        break;
                    case 'ArrowRight':
                        this.moveRight();
                        e.preventDefault();
                        break;
                    case 'ArrowDown':
                        this.softDrop();
                        e.preventDefault();
                        break;
                    case 'ArrowUp':
                    case 'z':
                    case 'Z':
                        this.rotatePiece();
                        e.preventDefault();
                        break;
                    case ' ':
                        this.hardDrop();
                        e.preventDefault();
                        break;
                }
            }

            generateNextPiece() {
                if (this.nextPiece === null) {
                    this.nextPiece = this.createPiece();
                }
                this.currentPiece = this.nextPiece;
                this.nextPiece = this.createPiece();
                this.drawNextPiece();
            }

            createPiece() {
                const shapeIndex = Math.floor(Math.random() * SHAPES.length);
                return {
                    shape: SHAPES[shapeIndex],
                    colorIndex: shapeIndex,
                    x: Math.floor(COLS / 2) - 1,
                    y: 0
                };
            }

            canMove(piece, x, y) {
                for (let row = 0; row < piece.shape.length; row++) {
                    for (let col = 0; col < piece.shape[row].length; col++) {
                        if (piece.shape[row][col]) {
                            const newX = piece.x + x + col;
                            const newY = piece.y + y + row;

                            if (newX < 0 || newX >= COLS || newY >= ROWS) return false;
                            if (newY >= 0 && this.grid[newY][newX]) return false;
                        }
                    }
                }
                return true;
            }

            moveLeft() {
                if (this.canMove(this.currentPiece, -1, 0)) {
                    this.currentPiece.x--;
                }
            }

            moveRight() {
                if (this.canMove(this.currentPiece, 1, 0)) {
                    this.currentPiece.x++;
                }
            }

            softDrop() {
                if (this.canMove(this.currentPiece, 0, 1)) {
                    this.currentPiece.y++;
                    this.score += 1;
                    this.updateUI();
                }
            }

            hardDrop() {
                while (this.canMove(this.currentPiece, 0, 1)) {
                    this.currentPiece.y++;
                    this.score += 2;
                }
                this.lockPiece();
            }

            rotatePiece() {
                const original = this.currentPiece.shape;
                this.currentPiece.shape = this.rotate(this.currentPiece.shape);

                if (!this.canMove(this.currentPiece, 0, 0)) {
                    this.currentPiece.shape = original;
                }
            }

            rotate(shape) {
                const n = shape.length;
                const rotated = Array(shape[0].length).fill(null).map(() => Array(n).fill(0));

                for (let row = 0; row < n; row++) {
                    for (let col = 0; col < shape[row].length; col++) {
                        rotated[col][n - 1 - row] = shape[row][col];
                    }
                }

                return rotated;
            }

            lockPiece() {
                for (let row = 0; row < this.currentPiece.shape.length; row++) {
                    for (let col = 0; col < this.currentPiece.shape[row].length; col++) {
                        if (this.currentPiece.shape[row][col]) {
                            const x = this.currentPiece.x + col;
                            const y = this.currentPiece.y + row;

                            if (y < 0) {
                                this.gameOver();
                                return;
                            }

                            this.grid[y][x] = this.currentPiece.colorIndex + 1;
                        }
                    }
                }

                this.clearLines();
                this.generateNextPiece();
            }

            clearLines() {
                let linesCleared = 0;

                for (let row = ROWS - 1; row >= 0; row--) {
                    if (this.grid[row].every(cell => cell !== 0)) {
                        this.grid.splice(row, 1);
                        this.grid.unshift(Array(COLS).fill(0));
                        linesCleared++;
                        row++;
                    }
                }

                if (linesCleared > 0) {
                    this.lines += linesCleared;
                    const points = [0, 100, 300, 500, 800];
                    this.score += points[Math.min(linesCleared, 4)];
                    this.updateLevel();
                    this.updateUI();
                }
            }

            updateLevel() {
                this.level = Math.floor(this.lines / 10) + 1;
                this.dropInterval = this.getDropInterval();
            }

            getDropInterval() {
                return Math.max(100, 500 - (this.level - 1) * 50);
            }

            start() {
                if (this.gameActive) return;
                this.gameActive = true;
                this.gamePaused = false;
                document.getElementById('startBtn').disabled = true;
                document.getElementById('pauseBtn').disabled = false;
                this.gameLoop();
            }

            togglePause() {
                this.gamePaused = !this.gamePaused;
                document.getElementById('pauseBtn').textContent = this.gamePaused ? '繼續' : '暫停';
                if (!this.gamePaused) {
                    this.gameLoop();
                }
            }

            reset() {
                this.grid = Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
                this.score = 0;
                this.lines = 0;
                this.level = 1;
                this.gameActive = false;
                this.gamePaused = false;
                this.dropCounter = 0;
                this.dropInterval = this.getDropInterval();
                this.generateNextPiece();
                this.updateUI();
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
                document.getElementById('pauseBtn').textContent = '暫停';
                this.draw();
            }

            gameOver() {
                this.gameActive = false;
                document.getElementById('startBtn').disabled = false;
                document.getElementById('pauseBtn').disabled = true;
                alert(`遊戲結束！\n得分: ${this.score}\n消除行數: ${this.lines}\n等級: ${this.level}`);
                this.reset();
            }

            gameLoop() {
                if (!this.gameActive || this.gamePaused) return;

                this.dropCounter += 16;

                if (this.dropCounter > this.dropInterval) {
                    if (this.canMove(this.currentPiece, 0, 1)) {
                        this.currentPiece.y++;
                    } else {
                        this.lockPiece();
                    }
                    this.dropCounter = 0;
                }

                this.draw();
                setTimeout(() => this.gameLoop(), 16);
            }

            draw() {
                // 清除畫布
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);

                // 繪製網格線
                this.ctx.strokeStyle = '#222';
                this.ctx.lineWidth = 0.5;
                for (let i = 0; i <= COLS; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(i * BLOCK_SIZE, 0);
                    this.ctx.lineTo(i * BLOCK_SIZE, this.canvas.height);
                    this.ctx.stroke();
                }
                for (let i = 0; i <= ROWS; i++) {
                    this.ctx.beginPath();
                    this.ctx.moveTo(0, i * BLOCK_SIZE);
                    this.ctx.lineTo(this.canvas.width, i * BLOCK_SIZE);
                    this.ctx.stroke();
                }

                // 繪製已置放的方塊
                for (let row = 0; row < ROWS; row++) {
                    for (let col = 0; col < COLS; col++) {
                        if (this.grid[row][col]) {
                            this.drawBlock(col, row, COLORS[this.grid[row][col] - 1]);
                        }
                    }
                }

                // 繪製當前方塊
                if (this.currentPiece) {
                    for (let row = 0; row < this.currentPiece.shape.length; row++) {
                        for (let col = 0; col < this.currentPiece.shape[row].length; col++) {
                            if (this.currentPiece.shape[row][col]) {
                                const x = this.currentPiece.x + col;
                                const y = this.currentPiece.y + row;
                                if (y >= 0) {
                                    this.drawBlock(x, y, COLORS[this.currentPiece.colorIndex]);
                                }
                            }
                        }
                    }
                }
            }

            drawBlock(x, y, color) {
                this.ctx.fillStyle = color;
                this.ctx.fillRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                this.ctx.strokeStyle = '#fff';
                this.ctx.lineWidth = 1;
                this.ctx.strokeRect(x * BLOCK_SIZE + 1, y * BLOCK_SIZE + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
            }

            drawNextPiece() {
                this.nextCtx.fillStyle = '#000';
                this.nextCtx.fillRect(0, 0, this.nextCanvas.width, this.nextCanvas.height);

                const piece = this.nextPiece;
                const blockSize = 15;
                const startX = (this.nextCanvas.width - piece.shape[0].length * blockSize) / 2;
                const startY = (this.nextCanvas.height - piece.shape.length * blockSize) / 2;

                for (let row = 0; row < piece.shape.length; row++) {
                    for (let col = 0; col < piece.shape[row].length; col++) {
                        if (piece.shape[row][col]) {
                            this.nextCtx.fillStyle = COLORS[piece.colorIndex];
                            this.nextCtx.fillRect(
                                startX + col * blockSize,
                                startY + row * blockSize,
                                blockSize - 2,
                                blockSize - 2
                            );
                        }
                    }
                }
            }

            updateUI() {
                document.getElementById('score').textContent = this.score;
                document.getElementById('level').textContent = this.level;
                document.getElementById('lines').textContent = this.lines;
            }
        }

        // 初始化遊戲
        const game = new TetrisGame();
        game.updateUI();
        game.draw();
    </script>
</body>
</html>
