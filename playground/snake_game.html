<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>貪食蛇遊戲 - Snake Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Arial', sans-serif;
        }

        .container {
            text-align: center;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
        }

        .subtitle {
            color: #666;
            margin-bottom: 20px;
            font-size: 0.95em;
        }

        .game-wrapper {
            display: flex;
            gap: 30px;
            justify-content: center;
            align-items: flex-start;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        #gameCanvas {
            border: 3px solid #333;
            background-color: #1a1a1a;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            cursor: none;
        }

        .info-panel {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            min-width: 200px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .info-item {
            text-align: left;
            background: rgba(255, 255, 255, 0.1);
            padding: 12px;
            border-radius: 8px;
            border-left: 4px solid #ffd700;
        }

        .info-label {
            font-size: 0.85em;
            opacity: 0.9;
            margin-bottom: 3px;
        }

        .info-value {
            font-size: 1.8em;
            font-weight: bold;
        }

        .controls {
            margin-top: 25px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .button-group {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            padding: 12px 24px;
            font-size: 1em;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-width: 120px;
        }

        #startBtn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        #startBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        #pauseBtn {
            background: #ff9800;
            color: white;
            min-width: 120px;
        }

        #pauseBtn:hover:not(:disabled) {
            background: #e68900;
            transform: translateY(-2px);
        }

        #pauseBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .instructions {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
            text-align: left;
        }

        .instructions h3 {
            color: #333;
            margin-bottom: 10px;
        }

        .instructions p {
            color: #666;
            line-height: 1.6;
            margin: 5px 0;
            font-size: 0.95em;
        }

        .key-list {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 10px;
        }

        .key-item {
            background: white;
            padding: 8px;
            border-radius: 5px;
            font-size: 0.9em;
        }

        .key-item strong {
            color: #667eea;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1em;
        }

        .status.welcome {
            background: #e3f2fd;
            color: #1976d2;
            display: none;
        }

        .status.playing {
            background: #f3e5f5;
            color: #7b1fa2;
            display: none;
        }

        .status.paused {
            background: #fff3e0;
            color: #e65100;
            display: none;
        }

        .status.gameover {
            background: #ffebee;
            color: #c62828;
            display: none;
        }

        .status.active {
            display: block;
        }

        .highest-score {
            background: #ffd700;
            color: #333;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            font-size: 1.2em;
            font-weight: bold;
        }

        .difficulty-selector {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin: 10px 0;
        }

        .difficulty-btn {
            padding: 8px 16px;
            border: 2px solid #667eea;
            background: white;
            color: #667eea;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
        }

        .difficulty-btn.active {
            background: #667eea;
            color: white;
        }

        .difficulty-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>🐍 貪食蛇遊戲</h1>
        <p class="subtitle">Snake Game - 用方向鍵控制蛇的移動</p>

        <div class="game-wrapper">
            <div>
                <canvas id="gameCanvas" width="600" height="600"></canvas>
            </div>

            <div class="info-panel">
                <div class="info-item">
                    <div class="info-label">📊 分數</div>
                    <div class="info-value" id="score">0</div>
                </div>

                <div class="info-item">
                    <div class="info-label">⚡ 速度等級</div>
                    <div class="info-value" id="level">1</div>
                </div>

                <div class="info-item">
                    <div class="info-label">🍎 食物數</div>
                    <div class="info-value" id="foodCount">0</div>
                </div>

                <div class="highest-score">
                    🏆 最高分：<span id="highestScore">0</span>
                </div>
            </div>
        </div>

        <div class="controls">
            <div>
                <label for="difficulty" style="color: #333; font-weight: bold; margin-right: 10px;">難度選擇：</label>
                <div class="difficulty-selector">
                    <button class="difficulty-btn active" data-difficulty="easy">簡單</button>
                    <button class="difficulty-btn" data-difficulty="medium">中等</button>
                    <button class="difficulty-btn" data-difficulty="hard">困難</button>
                </div>
            </div>

            <div class="button-group">
                <button id="startBtn">▶️ 開始遊戲</button>
                <button id="pauseBtn" disabled>⏸️ 暫停</button>
            </div>
        </div>

        <div class="status welcome active" id="statusWelcome">
            👋 點擊「開始遊戲」按鈕開始玩吧！
        </div>
        <div class="status playing" id="statusPlaying">
            🎮 遊戲進行中... 祝你好運！
        </div>
        <div class="status paused" id="statusPaused">
            ⏸️ 遊戲已暫停 - 按「暫停」按鈕繼續或按空白鍵恢復
        </div>
        <div class="status gameover" id="statusGameover">
            💀 遊戲結束！按「開始遊戲」重新開始
        </div>

        <div class="instructions">
            <h3>📖 遊戲規則</h3>
            <p>
                🕹️ 用<strong>方向鍵</strong>或<strong>WASD</strong>控制蛇的移動<br>
                🍎 吃到紅色食物會變長，每吃5個食物速度提升一級<br>
                ⚠️ 撞到牆壁或自己會結束遊戲<br>
                ⏸️ 按<strong>空白鍵</strong>或按下「暫停」按鈕可以暫停遊戲<br>
                📈 分數 = 吃到食物的數量 × 難度倍數
            </p>
            <div class="key-list">
                <div class="key-item"><strong>↑↓←→</strong> 移動</div>
                <div class="key-item"><strong>W/A/S/D</strong> 移動</div>
                <div class="key-item"><strong>空白鍵</strong> 暫停</div>
                <div class="key-item"><strong>R 鍵</strong> 重新開始</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 遊戲常數
        const GRID_SIZE = 20;
        const GAME_WIDTH = canvas.width;
        const GAME_HEIGHT = canvas.height;

        // 遊戲狀態
        let gameState = {
            running: false,
            paused: false,
            score: 0,
            level: 1,
            foodEaten: 0,
            highestScore: localStorage.getItem('snakeHighestScore') || 0
        };

        // 難度設定
        const difficulties = {
            easy: { speed: 8, scoreMultiplier: 1 },
            medium: { speed: 12, scoreMultiplier: 1.5 },
            hard: { speed: 16, scoreMultiplier: 2 }
        };
        let currentDifficulty = 'easy';

        // 蛇
        let snake = [
            { x: 10, y: 10 },
            { x: 9, y: 10 },
            { x: 8, y: 10 }
        ];

        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };

        // 食物
        let food = generateFood();

        let gameLoopInterval;
        let currentSpeed = difficulties[currentDifficulty].speed;

        // 初始化
        function init() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            food = generateFood();
            gameState = {
                running: false,
                paused: false,
                score: 0,
                level: 1,
                foodEaten: 0,
                highestScore: gameState.highestScore
            };
            updateUI();
            draw();
        }

        // 生成食物
        function generateFood() {
            let newFood;
            let isOnSnake;
            do {
                newFood = {
                    x: Math.floor(Math.random() * (GAME_WIDTH / GRID_SIZE)),
                    y: Math.floor(Math.random() * (GAME_HEIGHT / GRID_SIZE))
                };
                isOnSnake = snake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
            } while (isOnSnake);
            return newFood;
        }

        // 更新遊戲
        function update() {
            if (!gameState.running || gameState.paused) return;

            direction = nextDirection;

            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };

            // 檢查碰撞 - 牆壁
            if (head.x < 0 || head.x >= GAME_WIDTH / GRID_SIZE ||
                head.y < 0 || head.y >= GAME_HEIGHT / GRID_SIZE) {
                gameOver();
                return;
            }

            // 檢查碰撞 - 自己
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                gameOver();
                return;
            }

            snake.unshift(head);

            // 檢查是否吃到食物
            if (head.x === food.x && head.y === food.y) {
                gameState.foodEaten++;
                const scoreMultiplier = difficulties[currentDifficulty].scoreMultiplier;
                gameState.score += Math.floor(10 * scoreMultiplier);

                // 每吃5個食物，速度提升一級
                if (gameState.foodEaten % 5 === 0) {
                    gameState.level++;
                    currentSpeed = difficulties[currentDifficulty].speed + gameState.level * 2;
                    clearInterval(gameLoopInterval);
                    gameLoopInterval = setInterval(gameLoop, 1000 / currentSpeed);
                }

                food = generateFood();
            } else {
                snake.pop();
            }

            updateUI();
        }

        // 繪製遊戲
        function draw() {
            // 清空畫布
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);

            // 畫網格
            ctx.strokeStyle = '#2a2a2a';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= GAME_WIDTH; i += GRID_SIZE) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, GAME_HEIGHT);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(GAME_WIDTH, i);
                ctx.stroke();
            }

            // 畫蛇
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // 蛇頭 - 綠色漸層
                    const grad = ctx.createLinearGradient(segment.x * GRID_SIZE, segment.y * GRID_SIZE,
                        segment.x * GRID_SIZE + GRID_SIZE, segment.y * GRID_SIZE + GRID_SIZE);
                    grad.addColorStop(0, '#00ff00');
                    grad.addColorStop(1, '#00cc00');
                    ctx.fillStyle = grad;
                } else {
                    // 蛇身 - 綠色漸層，越往後越暗
                    const intensity = 220 - (index * 3) % 100;
                    ctx.fillStyle = `rgb(0, ${intensity}, 0)`;
                }
                ctx.fillRect(segment.x * GRID_SIZE + 1, segment.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2);

                // 蛇身邊框
                ctx.strokeStyle = '#00ff00';
                ctx.lineWidth = 1;
                ctx.strokeRect(segment.x * GRID_SIZE + 1, segment.y * GRID_SIZE + 1, GRID_SIZE - 2, GRID_SIZE - 2);
            });

            // 畫食物 - 紅色圓形
            ctx.fillStyle = '#ff3333';
            ctx.beginPath();
            ctx.arc(food.x * GRID_SIZE + GRID_SIZE / 2, food.y * GRID_SIZE + GRID_SIZE / 2, GRID_SIZE / 2.5, 0, Math.PI * 2);
            ctx.fill();

            // 食物光暈
            ctx.strokeStyle = '#ffaa33';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.arc(food.x * GRID_SIZE + GRID_SIZE / 2, food.y * GRID_SIZE + GRID_SIZE / 2, GRID_SIZE / 2.5 + 3, 0, Math.PI * 2);
            ctx.stroke();
        }

        // 遊戲循環
        function gameLoop() {
            update();
            draw();
        }

        // 更新UI
        function updateUI() {
            document.getElementById('score').textContent = gameState.score;
            document.getElementById('level').textContent = gameState.level;
            document.getElementById('foodCount').textContent = gameState.foodEaten;
            document.getElementById('highestScore').textContent = gameState.highestScore;
        }

        // 遊戲結束
        function gameOver() {
            gameState.running = false;
            gameState.paused = false;
            clearInterval(gameLoopInterval);
            document.getElementById('pauseBtn').disabled = true;

            // 更新最高分
            if (gameState.score > gameState.highestScore) {
                gameState.highestScore = gameState.score;
                localStorage.setItem('snakeHighestScore', gameState.highestScore);
                document.getElementById('highestScore').textContent = gameState.highestScore;
            }

            updateStatusDisplay();
        }

        // 開始遊戲
        function startGame() {
            init();
            gameState.running = true;
            document.getElementById('startBtn').disabled = true;
            document.getElementById('pauseBtn').disabled = false;
            currentSpeed = difficulties[currentDifficulty].speed;
            gameLoopInterval = setInterval(gameLoop, 1000 / currentSpeed);
            updateStatusDisplay();
            draw();
        }

        // 暫停遊戲
        function togglePause() {
            if (!gameState.running) return;
            gameState.paused = !gameState.paused;
            updateStatusDisplay();
        }

        // 更新狀態顯示
        function updateStatusDisplay() {
            document.getElementById('statusWelcome').classList.remove('active');
            document.getElementById('statusPlaying').classList.remove('active');
            document.getElementById('statusPaused').classList.remove('active');
            document.getElementById('statusGameover').classList.remove('active');

            if (!gameState.running) {
                if (gameState.paused) {
                    document.getElementById('statusPaused').classList.add('active');
                } else if (gameState.score > 0) {
                    document.getElementById('statusGameover').classList.add('active');
                } else {
                    document.getElementById('statusWelcome').classList.add('active');
                }
            } else {
                if (gameState.paused) {
                    document.getElementById('statusPaused').classList.add('active');
                } else {
                    document.getElementById('statusPlaying').classList.add('active');
                }
            }
        }

        // 鍵盤控制
        document.addEventListener('keydown', (e) => {
            const key = e.key.toUpperCase();

            // 方向控制
            if (e.key === 'ArrowUp' || key === 'W') {
                e.preventDefault();
                if (direction.y === 0) nextDirection = { x: 0, y: -1 };
            } else if (e.key === 'ArrowDown' || key === 'S') {
                e.preventDefault();
                if (direction.y === 0) nextDirection = { x: 0, y: 1 };
            } else if (e.key === 'ArrowLeft' || key === 'A') {
                e.preventDefault();
                if (direction.x === 0) nextDirection = { x: -1, y: 0 };
            } else if (e.key === 'ArrowRight' || key === 'D') {
                e.preventDefault();
                if (direction.x === 0) nextDirection = { x: 1, y: 0 };
            } else if (e.code === 'Space') {
                e.preventDefault();
                if (gameState.running) togglePause();
            } else if (key === 'R') {
                startGame();
            }
        });

        // 按鈕事件
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('pauseBtn').addEventListener('click', togglePause);

        // 難度選擇
        document.querySelectorAll('.difficulty-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                document.querySelectorAll('.difficulty-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                currentDifficulty = e.target.dataset.difficulty;
                if (!gameState.running) {
                    init();
                    draw();
                }
            });
        });

        // 初始化繪製
        init();
        draw();
        updateStatusDisplay();
    </script>
</body>

</html>
